name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod, dev]
      stacks:
        description: Which stacks to deploy (comma-separated, or "all")
        required: true
        default: all
        type: string

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy CFN stacks
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ENV: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------------------------------------------------
      # 01 — GitHub OIDC (skipped here — must be bootstrapped manually)
      # -----------------------------------------------------------------------

      # -----------------------------------------------------------------------
      # 02 — Storage
      # -----------------------------------------------------------------------
      - name: Deploy 02-storage
        if: inputs.stacks == 'all' || contains(inputs.stacks, '02') || contains(inputs.stacks, 'storage')
        run: |
          aws cloudformation deploy \
            --stack-name schedule-marketplace-storage-$ENV \
            --template-file infra/cfn/02-storage.yml \
            --parameter-overrides Environment=$ENV \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # -----------------------------------------------------------------------
      # 03 — Cognito
      # -----------------------------------------------------------------------
      - name: Deploy 03-cognito
        if: inputs.stacks == 'all' || contains(inputs.stacks, '03') || contains(inputs.stacks, 'cognito')
        run: |
          aws cloudformation deploy \
            --stack-name schedule-marketplace-cognito-$ENV \
            --template-file infra/cfn/03-cognito.yml \
            --parameter-overrides \
              Environment=$ENV \
              AppDomain=${{ vars.APP_DOMAIN || 'http://localhost:5173' }} \
              CognitoDomainPrefix=${{ vars.COGNITO_DOMAIN_PREFIX || 'schedule-marketplace' }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # -----------------------------------------------------------------------
      # 04 — Lambda + API Gateway
      # -----------------------------------------------------------------------
      - name: Deploy 04-lambda
        if: inputs.stacks == 'all' || contains(inputs.stacks, '04') || contains(inputs.stacks, 'lambda')
        run: |
          aws cloudformation deploy \
            --stack-name schedule-marketplace-lambda-$ENV \
            --template-file infra/cfn/04-lambda.yml \
            --parameter-overrides \
              Environment=$ENV \
              "DeployBucket=/schedule-marketplace/$ENV/deploy-bucket" \
              "TeamsTable=/schedule-marketplace/$ENV/teams-table" \
              "SchedulesTable=/schedule-marketplace/$ENV/schedules-table" \
              "MarketplaceTable=/schedule-marketplace/$ENV/marketplace-table" \
              "ImportJobsTable=/schedule-marketplace/$ENV/import-jobs-table" \
              "ImportBucket=/schedule-marketplace/$ENV/import-bucket" \
              "ScraperBucket=/schedule-marketplace/$ENV/scraper-bucket" \
              "CognitoUserPoolId=/schedule-marketplace/$ENV/cognito-user-pool-id" \
              "CognitoClientId=/schedule-marketplace/$ENV/cognito-client-id" \
              "AppDomain=${{ vars.APP_DOMAIN || '' }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # -----------------------------------------------------------------------
      # 04b — Wire S3 → scraper-sync Lambda notification
      # (can't do this in CFN when bucket is in a different stack)
      # -----------------------------------------------------------------------
      - name: Wire S3 scraper-sync notification
        if: inputs.stacks == 'all' || contains(inputs.stacks, '04') || contains(inputs.stacks, 'lambda')
        run: |
          SCRAPER_BUCKET=$(aws ssm get-parameter \
            --name /schedule-marketplace/$ENV/scraper-bucket \
            --query Parameter.Value --output text)
          SYNC_FN_ARN=$(aws lambda get-function-configuration \
            --function-name schedule-marketplace-scraper-sync-$ENV \
            --query FunctionArn --output text)

          aws s3api put-bucket-notification-configuration \
            --bucket "$SCRAPER_BUCKET" \
            --notification-configuration "{
              \"LambdaFunctionConfigurations\": [{
                \"LambdaFunctionArn\": \"$SYNC_FN_ARN\",
                \"Events\": [\"s3:ObjectCreated:*\"],
                \"Filter\": {
                  \"Key\": {
                    \"FilterRules\": [
                      {\"Name\": \"prefix\", \"Value\": \"scraper/\"},
                      {\"Name\": \"suffix\", \"Value\": \"teams.json\"}
                    ]
                  }
                }
              }]
            }"

          echo "S3 notification configured: s3://$SCRAPER_BUCKET/scraper/teams.json → $SYNC_FN_ARN"

      # -----------------------------------------------------------------------
      # 05 — CDN
      # -----------------------------------------------------------------------
      - name: Deploy 05-cdn
        if: inputs.stacks == 'all' || contains(inputs.stacks, '05') || contains(inputs.stacks, 'cdn')
        run: |
          aws cloudformation deploy \
            --stack-name schedule-marketplace-cdn-$ENV \
            --template-file infra/cfn/05-cdn.yml \
            --parameter-overrides \
              Environment=$ENV \
              "FrontendBucketName=/schedule-marketplace/$ENV/frontend-bucket" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # -----------------------------------------------------------------------
      # Print stack outputs for reference
      # -----------------------------------------------------------------------
      - name: Print outputs
        if: always()
        run: |
          echo "=== Stack Outputs ==="
          for stack in storage cognito lambda cdn; do
            echo "--- schedule-marketplace-$stack-$ENV ---"
            aws cloudformation describe-stacks \
              --stack-name schedule-marketplace-$stack-$ENV \
              --query "Stacks[0].Outputs" \
              --output table 2>/dev/null || echo "(not deployed)"
          done

          echo ""
          echo "=== Key SSM Parameters ==="
          aws ssm get-parameters-by-path \
            --path /schedule-marketplace/$ENV/ \
            --query "Parameters[*].{Name:Name,Value:Value}" \
            --output table 2>/dev/null || true
