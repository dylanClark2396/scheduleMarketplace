AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EC2 instance, security group, and IAM instance profile for the
  Schedule Marketplace backend API.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]

  # Resolves automatically to the latest Amazon Linux 2023 x86_64 AMI
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  AllowedCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: CIDR allowed to reach the API on port 3000 (restrict to ALB/CF IP in production)

Resources:

  # ---------------------------------------------------------------------------
  # Security Group
  # ---------------------------------------------------------------------------
  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Schedule Marketplace API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedCidr
          Description: API port
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: HTTPS
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: All outbound
      Tags:
        - Key: Name
          Value: !Sub schedule-marketplace-api-${Environment}

  # ---------------------------------------------------------------------------
  # IAM Role for EC2 — least-privilege for the backend
  # ---------------------------------------------------------------------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub schedule-marketplace-ec2-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager — connect to instance without SSH
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: schedule-marketplace-api
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # DynamoDB — full access to project tables only
              - Sid: DynamoDB
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*/index/*

              # S3 — read/write import & scraper buckets; read deploy bucket
              - Sid: S3ReadWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::schedule-marketplace-imports-${Environment}-${AWS::AccountId}
                  - !Sub arn:aws:s3:::schedule-marketplace-imports-${Environment}-${AWS::AccountId}/*
                  - !Sub arn:aws:s3:::schedule-marketplace-scraper-${Environment}-${AWS::AccountId}
                  - !Sub arn:aws:s3:::schedule-marketplace-scraper-${Environment}-${AWS::AccountId}/*

              - Sid: S3DeployRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::schedule-marketplace-deploy-${Environment}-${AWS::AccountId}
                  - !Sub arn:aws:s3:::schedule-marketplace-deploy-${Environment}-${AWS::AccountId}/*

              # Textract — analyze documents for schedule OCR
              - Sid: Textract
                Effect: Allow
                Action:
                  - textract:AnalyzeDocument
                  - textract:DetectDocumentText
                Resource: '*'

              # SSM Parameter Store — read app config at runtime
              - Sid: SSMParams
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/schedule-marketplace/${Environment}/*

              # CloudWatch Logs — structured logging
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub schedule-marketplace-ec2-${Environment}
      Roles:
        - !Ref EC2Role

  # ---------------------------------------------------------------------------
  # EC2 Instance
  # ---------------------------------------------------------------------------
  ApiInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref ApiSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub schedule-marketplace-api-${Environment}
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: schedule-marketplace
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex
          exec > /var/log/userdata.log 2>&1

          # Update system
          dnf update -y

          # Install Node.js 20 and tools
          dnf install -y nodejs npm unzip
          npm install -g pnpm

          # Create app directory
          mkdir -p /opt/schedule-api
          chown ec2-user:ec2-user /opt/schedule-api

          # Create env file generator — pulls secrets from SSM at deploy time
          cat > /opt/schedule-api/refresh-env.sh << 'ENVSCRIPT'
          #!/bin/bash
          set -e
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          PREFIX=/schedule-marketplace/${Environment}

          get_param() {
            aws ssm get-parameter --region "$REGION" --name "$PREFIX/$1" \
              --query Parameter.Value --output text 2>/dev/null || echo ""
          }

          cat > /opt/schedule-api/.env << EOF
          COGNITO_USER_POOL_ID=$(get_param cognito-user-pool-id)
          COGNITO_CLIENT_ID=$(get_param cognito-client-id)
          S3_IMPORT_BUCKET=$(get_param import-bucket)
          S3_SCRAPER_BUCKET=$(get_param scraper-bucket)
          AWS_REGION=$REGION
          NODE_ENV=production
          EOF

          chmod 600 /opt/schedule-api/.env
          chown ec2-user:ec2-user /opt/schedule-api/.env
          ENVSCRIPT
          chmod +x /opt/schedule-api/refresh-env.sh

          # Create deploy script — called by GitHub Actions via SSM RunCommand
          cat > /opt/schedule-api/deploy.sh << 'DEPLOYSCRIPT'
          #!/bin/bash
          set -e
          REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          BUCKET=$(aws ssm get-parameter --region "$REGION" \
            --name /schedule-marketplace/${Environment}/deploy-bucket \
            --query Parameter.Value --output text)

          echo "Downloading from s3://$BUCKET/backend/server.zip"
          aws s3 cp --region "$REGION" "s3://$BUCKET/backend/server.zip" /tmp/server.zip

          echo "Extracting bundle"
          unzip -o /tmp/server.zip -d /opt/schedule-api
          chown -R ec2-user:ec2-user /opt/schedule-api

          echo "Refreshing environment config"
          /opt/schedule-api/refresh-env.sh

          echo "Restarting service"
          systemctl restart schedule-api

          echo "Deploy complete — $(date)"
          DEPLOYSCRIPT
          chmod +x /opt/schedule-api/deploy.sh

          # Create a minimal placeholder server.js so systemd doesn't fail on first boot
          cat > /opt/schedule-api/server.js << 'PLACEHOLDER'
          const http = require('http')
          http.createServer((req, res) => {
            res.writeHead(200)
            res.end('Schedule Marketplace API — awaiting first deploy\n')
          }).listen(3000, () => console.log('Placeholder running on :3000'))
          PLACEHOLDER
          touch /opt/schedule-api/.env

          # Systemd service
          cat > /etc/systemd/system/schedule-api.service << 'SERVICE'
          [Unit]
          Description=Schedule Marketplace API
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/schedule-api
          EnvironmentFile=/opt/schedule-api/.env
          ExecStart=/usr/bin/node /opt/schedule-api/server.js
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=schedule-api

          [Install]
          WantedBy=multi-user.target
          SERVICE

          systemctl daemon-reload
          systemctl enable schedule-api
          systemctl start schedule-api

          echo "UserData complete"

  # ---------------------------------------------------------------------------
  # Elastic IP — stable address for the API
  # ---------------------------------------------------------------------------
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref ApiInstance
      Tags:
        - Key: Name
          Value: !Sub schedule-marketplace-api-${Environment}

  # ---------------------------------------------------------------------------
  # SSM Parameters
  # ---------------------------------------------------------------------------
  ParamInstanceId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /schedule-marketplace/${Environment}/api-instance-id
      Type: String
      Value: !Ref ApiInstance

  ParamApiIp:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /schedule-marketplace/${Environment}/api-ip
      Type: String
      Value: !Ref ElasticIP

Outputs:
  ApiInstanceId:
    Value: !Ref ApiInstance
  ApiPublicIp:
    Value: !Ref ElasticIP
    Description: Backend API public IP — set VITE_API_BASE=http://{IP}:3000 in frontend build
  ApiUrl:
    Value: !Sub http://${ElasticIP}:3000
