AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC provider and deploy role.
  Deploy this stack ONCE manually with admin credentials before using any workflows.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub org or username (e.g. "myorg")
  GitHubRepo:
    Type: String
    Description: GitHub repository name (e.g. "scheduleMarketplace")
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]

Resources:

  # ---------------------------------------------------------------------------
  # IAM Role assumed by GitHub Actions workflows
  # Note: The GitHub OIDC provider (token.actions.githubusercontent.com) must
  # already exist in this account — only one is allowed per account. If it
  # doesn't exist yet, create it manually once:
  #   aws iam create-open-id-connect-provider \
  #     --url https://token.actions.githubusercontent.com \
  #     --client-id-list sts.amazonaws.com \
  #     --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1
  # ---------------------------------------------------------------------------
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub schedule-marketplace-github-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      ManagedPolicyArns:
        - !Ref DeployPolicy

  DeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub schedule-marketplace-deploy-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          # CloudFormation — only project stacks; ValidateTemplate has no resource scope
          - Sid: CloudFormationStacks
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResource
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ListStacks
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
            Resource:
              - !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/schedule-marketplace-*/*

          - Sid: CloudFormationValidate
            Effect: Allow
            Action: cloudformation:ValidateTemplate
            Resource: '*'

          # S3 — project buckets only (objects + bucket-level ops)
          - Sid: S3Objects
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource:
              - !Sub arn:aws:s3:::schedule-marketplace-deploy-${Environment}-${AWS::AccountId}/*
              - !Sub arn:aws:s3:::schedule-marketplace-frontend-${Environment}-${AWS::AccountId}/*
              - !Sub arn:aws:s3:::schedule-marketplace-scraper-${Environment}-${AWS::AccountId}/*

          - Sid: S3Buckets
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:PutBucketPublicAccessBlock
              - s3:CreateBucket
              - s3:PutBucketVersioning
              - s3:PutLifecycleConfiguration
              - s3:PutBucketCORS
            Resource:
              - !Sub arn:aws:s3:::schedule-marketplace-*-${Environment}-${AWS::AccountId}

          # SSM — project parameter namespace only
          - Sid: SSMParams
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath
              - ssm:PutParameter
              - ssm:DeleteParameter
            Resource:
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/schedule-marketplace/*

          # Lambda — update function code and read config (for deploy workflow)
          - Sid: LambdaDeploy
            Effect: Allow
            Action:
              - lambda:UpdateFunctionCode
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:ListVersionsByFunction
              - lambda:PublishVersion
            Resource:
              - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:schedule-marketplace-*

          # Lambda — create/manage functions (for CFN stack deploy)
          - Sid: LambdaManage
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:UpdateFunctionConfiguration
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:GetPolicy
              - lambda:TagResource
            Resource:
              - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:schedule-marketplace-*

          # IAM — project roles/policies only (needed for CFN to manage Lambda execution role)
          - Sid: IAMRoles
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:TagRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:GetRolePolicy
              - iam:DeleteRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
            Resource:
              - !Sub arn:aws:iam::${AWS::AccountId}:role/schedule-marketplace-*

          - Sid: IAMPolicies
            Effect: Allow
            Action:
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:CreatePolicyVersion
              - iam:ListPolicyVersions
              - iam:DeletePolicyVersion
            Resource:
              - !Sub arn:aws:iam::${AWS::AccountId}:policy/schedule-marketplace-*

          - Sid: IAMPassRole
            Effect: Allow
            Action: iam:PassRole
            Resource:
              - !Sub arn:aws:iam::${AWS::AccountId}:role/schedule-marketplace-*

          # DynamoDB — project tables only
          - Sid: DynamoDB
            Effect: Allow
            Action:
              - dynamodb:CreateTable
              - dynamodb:DeleteTable
              - dynamodb:DescribeTable
              - dynamodb:UpdateTable
              - dynamodb:TagResource
              - dynamodb:DescribeTimeToLive
              - dynamodb:UpdateTimeToLive
              - dynamodb:DescribeContinuousBackups
            Resource:
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/teams_*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/schedules_*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/marketplace_*
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/import_jobs_*

          # Cognito — scoped to user pools tagged to this project
          # (can't scope by ARN at create time, so scoped to pool name prefix via condition)
          - Sid: Cognito
            Effect: Allow
            Action:
              - cognito-idp:CreateUserPool
              - cognito-idp:DeleteUserPool
              - cognito-idp:DescribeUserPool
              - cognito-idp:UpdateUserPool
              - cognito-idp:CreateUserPoolClient
              - cognito-idp:DeleteUserPoolClient
              - cognito-idp:DescribeUserPoolClient
              - cognito-idp:UpdateUserPoolClient
              - cognito-idp:CreateUserPoolDomain
              - cognito-idp:DeleteUserPoolDomain
              - cognito-idp:DescribeUserPoolDomain
            Resource: '*'

          # API Gateway — project APIs only
          - Sid: ApiGateway
            Effect: Allow
            Action:
              - apigateway:GET
              - apigateway:POST
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
              - apigateway:TagResource
            Resource:
              - !Sub arn:aws:apigateway:${AWS::Region}::/apis
              - !Sub arn:aws:apigateway:${AWS::Region}::/apis/*

          # CloudFront — project distributions only
          # (distribution ID unknown at policy creation time, so scoped broadly but actions limited)
          - Sid: CloudFront
            Effect: Allow
            Action:
              - cloudfront:CreateDistribution
              - cloudfront:DeleteDistribution
              - cloudfront:GetDistribution
              - cloudfront:UpdateDistribution
              - cloudfront:CreateInvalidation
              - cloudfront:GetInvalidation
              - cloudfront:ListDistributions
              - cloudfront:CreateOriginAccessControl
              - cloudfront:DeleteOriginAccessControl
              - cloudfront:GetOriginAccessControl
              - cloudfront:TagResource
            Resource: '*'

          # ACM — certificates only (CloudFront requires us-east-1 certs)
          - Sid: ACM
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DeleteCertificate
              - acm:DescribeCertificate
              - acm:ListCertificates
              - acm:AddTagsToCertificate
            Resource: '*'

  # Store role ARN in SSM so workflows can read it
  RoleArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /schedule-marketplace/${Environment}/github-actions-role-arn
      Type: String
      Value: !GetAtt GitHubActionsRole.Arn

Outputs:
  GitHubActionsRoleArn:
    Description: Paste this into GitHub secret AWS_DEPLOY_ROLE
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub schedule-marketplace-github-role-${Environment}
